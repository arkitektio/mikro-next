"""
A microscope objective, described by its magnification, numerical aperture and immersion medium. Clients use it through optics views to record which objective an image was acquired with.
"""
type Objective {
  id: ID!
  name: String!
  serialNumber: String!
  na: Float
  magnification: Float
  immersion: String
  views(filters: OpticsViewFilter, pagination: OffsetPaginationInput): [OpticsView!]!
  organization: DjangoModelType!
}

enum ObjectiveCorrectionKind {
  UV
  PLAN_APO
  PLAN_FLUOR
  SUPER_FLUOR
  VIOLET_CORRECTED
  ACHRO
  ACHROMAT
  FLUOR
  FL
  FLUAR
  NEOFLUAR
  FLUOTAR
  APO
  PLAN_NEOFLUAR
  OTHER
}

