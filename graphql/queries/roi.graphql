query GetRois($image: ID!) {
  rois(filters: { image: $image }) {
    ...ROI
  }
}

query GetRoi($id: ID!) {
  roi(id: $id) {
    ...ROI
  }
}

query SearchRois($search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: rois(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
