query GetFile($id: ID!) {
  file(id: $id) {
    ...File
  }
}

query SearchFiles(
  $search: String
  $values: [ID!]
  $limit: Int
  $offset: Int = 0
) {
  options: files(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
