query GetTableCell($id: ID!) {
  tableCell(id: $id) {
    ...TableCell
  }
}

query SearchTableCells($table: ID!, $search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: tableCells(
    table: $table
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
