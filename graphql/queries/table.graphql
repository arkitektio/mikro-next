query GetTable($id: ID!) {
  table(id: $id) {
    ...Table
  }
}

query SearchTables($search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: tables(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
