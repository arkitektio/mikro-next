query GetRGBView($id: ID!) {
  rgbView(id: $id) {
    ...RGBView
  }
}

query SearchRGBViews($search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: rgbViews(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
