query GetStage($id: ID!) {
  stage(id: $id) {
    ...Stage
  }
}

query SearchStages(
  $search: String
  $values: [ID!]
  $limit: Int
  $offset: Int = 0
) {
  options: stages(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
