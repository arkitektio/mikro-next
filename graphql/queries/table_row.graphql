query GetTableRow($id: ID!) {
  tableRow(id: $id) {
    ...TableRow
  }
}

query SearchTableRows($table: ID!, $search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: tableRows(
    table: $table
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
