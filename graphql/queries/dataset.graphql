query GetDataset($id: ID!) {
    dataset(id: $id) {
        ...Dataset
    }
}

query SearchDatasets(
  $search: String
  $values: [ID!]
  $limit: Int
  $offset: Int = 0
) {
  options: datasets(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
