query GetSnapshot($id: ID!) {
  snapshot(id: $id) {
    ...Snapshot
  }
}

query SearchSnapshots($search: String, $values: [ID!], $limit: Int, $offset: Int = 0) {
  options: snapshots(
    filters: { name: { contains: $search }, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
