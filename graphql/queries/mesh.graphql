query GetMesh($id: ID!) {
  mesh(id: $id) {
    ...Mesh
  }
}

query SearchMeshes(
  $search: String
  $values: [ID!]
  $limit: Int
  $offset: Int = 0
) {
  options: meshes(
    filters: { search: $search, ids: $values }
    pagination: { limit: $limit, offset: $offset }
  ) {
    value: id
    label: name
  }
}
